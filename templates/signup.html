<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up | AI Digital Contract Risk Analyzer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="auth-container">
    <h1>AI Digital Contract Risk Analyzer</h1>
    <h2>Create an account</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="flash-messages">
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    <form method="post" class="auth-form">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required minlength="2" autocomplete="username">

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="email">

        <label for="password">Password</label>
        <input type="password" id="password" name="password" minlength="6" required autocomplete="new-password">

        <label for="confirm_password">Confirm Password</label>
        <input type="password" id="confirm_password" name="confirm_password" minlength="6" required autocomplete="new-password">

        <button type="submit">Sign Up</button>
    </form>

    <p class="auth-switch">
        Already have an account?
        <a href="{{ url_for('login') }}">Log in</a>
    </p>
</div>
<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
